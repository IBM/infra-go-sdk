# =============================================================================
# Multi-Node OpenShift Cluster Configuration Example
# =============================================================================
# This configuration demonstrates a production-ready multi-node OpenShift
# cluster deployment with 1 bootstrap, 3 masters, and 2 worker nodes.
# =============================================================================

# =============================================================================
# HELPER NODE CONFIGURATION
# =============================================================================
helper_node:
  hostname: "helper.example.com"
  ip: "192.0.2.10"
  ssh_user: "root"
  ssh_key_file: "~/.ssh/id_rsa"
  network_interface: "eth0"
  
  required_packages:
    - dnsmasq
    - haproxy
    - httpd
    - firewalld

# =============================================================================
# HMC CONFIGURATION
# =============================================================================
hmc:
  ip: "192.0.2.1"
  username: "REDACTED_HMC_USER<=="
  password: "REDACTED_HMC_PASS<=="

# =============================================================================
# CLUSTER DEFINITION
# =============================================================================
clusters:
  - name: "ocp-prod"                # Cluster name (used for DNS and deployment isolation)
    type: "multi-node"              # Multi-node cluster with bootstrap, masters, and workers
    ocp_version: "4.21"
    vip: "192.0.2.102"            # Single VIP for both API and Ingress
    
    cluster_config:
      
      # Physical Power Systems where LPARs will be created
      power_systems:
        - name: "LTC09U31-ZZ"
          vswitch_name: "ETHERNET0(Default)"
          vlan_id: 1337

      # Storage configuration
      storage:
        type: "vios"
        vios:
          - system_name: "LTC09U31-ZZ"
            vios_name: "ltc09u31-vios1"
            volume_group: "auto_vg01"

      # Network configuration
      # The cluster will be accessible at:
      #   - API: https://api.ocp-prod.example.com:6443
      #   - Apps: https://*.apps.ocp-prod.example.com
      network:
        domain: "example.com"
        base_domain: "example.com"
        network_cidr: "192.0.2.0/20"
        gateway: "192.0.2.254"
        netmask: "255.255.240.0"
        broadcast: "203.0.113.255"
        nameserver: "192.0.2.10"
        dns_forwarders:
          - "10.0.10.4"
          - "10.0.10.5"
        ntp_servers:
          - "10.0.10.4"
          - "10.0.10.5"
        mac_prefix: "52:54:00"

      # OpenShift configuration
      openshift:
        version: "4.21"
        pull_secret_file: "./pull-secret.json"
        ssh_public_key_file: "~/.ssh/id_rsa.pub"
        
        # SDN Configuration
        cluster_network_cidr: "10.128.0.0/14"
        cluster_network_host_prefix: 23
        service_network: "172.30.0.0/16"
        machine_network: "192.0.2.0/20"
        
        # RHCOS images
        rhcos_images:
          kernel_url: "https://mirror.openshift.com/pub/openshift-v4/ppc64le/dependencies/rhcos/4.21/4.21.0/rhcos-live-kernel.ppc64le"
          initramfs_url: "https://mirror.openshift.com/pub/openshift-v4/ppc64le/dependencies/rhcos/4.21/4.21.0/rhcos-live-initramfs.ppc64le.img"
          rootfs_url: "https://mirror.openshift.com/pub/openshift-v4/ppc64le/dependencies/rhcos/4.21/4.21.0/rhcos-live-rootfs.ppc64le.img"
        
        # OpenShift client tools
        ocp_client_config:
          ocp_client_arch: "ppc64le"
          ocp_base_url: "https://mirror.openshift.com/pub/openshift-v4/multi/clients"
          ocp_client_base: "ocp"
          ocp_client_tag: "latest-4.21"
          ocp_client: "https://mirror.openshift.com/pub/openshift-v4/multi/clients/ocp/latest-4.21/ppc64le/openshift-client-linux.tar.gz"
          ocp_installer: "https://mirror.openshift.com/pub/openshift-v4/multi/clients/ocp/latest-4.21/ppc64le/openshift-install-linux.tar.gz"
        
        disk_device: "/dev/sda"
        install_type: "multi-node"
        force_ocp_download: true
        rhcos_arch: "ppc64le"
        rhcos_kernel_options: []
        sysctl_tuned_options: false
        powervm_rmc: true
        force_dns: true

      # ========================================================================
      # BOOTSTRAP NODE
      # ========================================================================
      # The bootstrap node is temporary and will be removed after cluster init
      bootstrap:
        name: "bootstrap"
        hostname: "ocp-prod-bootstrap"
        ip: "198.51.100.10"
        system_name: "LTC09U31-ZZ"
        lpar:
          os_type: "AIX/Linux"
          processor:
            type: "shared"
            units: 2.0
            virtual_procs: 8
            min_units: 1.0
            max_units: 4.0
            min_procs: 4
            max_procs: 16
          memory:
            desired_mb: 16384      # 16GB
            min_mb: 8192
            max_mb: 32768
          storage:
            boot_disk_gb: 120

      # ========================================================================
      # MASTER NODES (Control Plane)
      # ========================================================================
      # Masters run the control plane components (API server, etcd, scheduler, etc.)
      # Minimum 3 masters required for HA
      masters:
        nodes:
          - name: "master-0"
            hostname: "ocp-prod-master-0"
            ip: "198.51.100.11"
            system_name: "LTC09U31-ZZ"
          
          - name: "master-1"
            hostname: "ocp-prod-master-1"
            ip: "198.51.100.12"
            system_name: "LTC09U31-ZZ"
          
          - name: "master-2"
            hostname: "ocp-prod-master-2"
            ip: "198.51.100.13"
            system_name: "LTC09U31-ZZ"
        
        # Shared LPAR configuration for all master nodes
        lpar:
          os_type: "AIX/Linux"
          processor:
            type: "shared"
            units: 4.0
            virtual_procs: 16
            min_units: 2.0
            max_units: 8.0
            min_procs: 8
            max_procs: 32
          memory:
            desired_mb: 32768      # 32GB per master
            min_mb: 16384
            max_mb: 65536
          storage:
            boot_disk_gb: 120
            etcd_disk_gb: 100      # Dedicated etcd disk for masters
            container_storage_gb: 200

      # ========================================================================
      # WORKER NODES (Compute)
      # ========================================================================
      # Workers run application workloads
      # Can scale from 0 to many workers
      workers:
        nodes:
          - name: "worker-0"
            hostname: "ocp-prod-worker-0"
            ip: "198.51.100.20"
            system_name: "LTC09U31-ZZ"
          
          - name: "worker-1"
            hostname: "ocp-prod-worker-1"
            ip: "198.51.100.21"
            system_name: "LTC09U31-ZZ"
        
        # Shared LPAR configuration for all worker nodes
        lpar:
          os_type: "AIX/Linux"
          processor:
            type: "shared"
            units: 6.0
            virtual_procs: 24
            min_units: 3.0
            max_units: 12.0
            min_procs: 12
            max_procs: 48
          memory:
            desired_mb: 65536      # 64GB per worker
            min_mb: 32768
            max_mb: 131072
          storage:
            boot_disk_gb: 120
            data_disk_gb: 500      # Large disk for application data

      # ========================================================================
      # DEPLOYMENT CONFIGURATION
      # ========================================================================
      deployment:
        phases:
          - validate
          - check_resources
          - setup_helper_services
          - setup_http
          - download_images
          - create_lpars
          - setup_dns               # Configure DNS records for cluster nodes and services
          - setup_dhcp              # Configure DHCP with MAC-to-IP bindings
          - setup_pxe               # Configure PXE/TFTP boot for network installation
          - setup_haproxy
          - generate_ignition
          - power_on
          - wait_bootstrap          # Wait for bootstrap to complete (20-30 min)
          - wait_installation       # Wait for installation to complete (30-60 min)
        
        timeouts:
          lpar_creation: 10
          power_on: 5
          helper_setup: 30
          bootstrap_complete: 1800    # 30 mins for bootstrap
          installation_complete: 3600 # 60 mins for full cluster
        
        retry:
          max_attempts: 3
          delay_seconds: 30
        
        cleanup_on_failure: false
        verbose: true

      # ========================================================================
      # ADVANCED CONFIGURATION
      # ========================================================================
      advanced:
        parallel_lpar_creation: true      # Enable parallel creation for faster deployment
        max_parallel_operations: 3        # Create up to 3 LPARs concurrently
        validate_resources: true
        check_network_connectivity: true
        verify_storage_capacity: true
        preserve_ignition_files: true
        preserve_install_artifacts: true
        enable_detailed_logging: true
        log_file: "./deployment-ocp-prod.log"
        save_state_on_each_phase: true
        state_file: "deployment-state-ocp-prod.json"

