# =============================================================================
# OpenShift UPI Deployment Configuration for IBM Power Systems
# =============================================================================
# This configuration file defines all parameters needed to deploy OpenShift
# Container Platform in User-Provisioned Infrastructure (UPI) mode on IBM Power
# Systems using HMC for LPAR management.
#
# The deployment uses dnsmasq for integrated DHCP, DNS, and TFTP services.
# =============================================================================

# =============================================================================
# HMC CONFIGURATION
# =============================================================================
hmc:
  ip: "192.0.2.1"
  username: "REDACTED_HMC_USER<=="
  password: "REDACTED_HMC_PASS<=="

# =============================================================================
# POWER SYSTEMS CONFIGURATION
# =============================================================================
power_systems:
  - name: "LTC09U31-ZZ"
    vswitch_name: "ETHERNET0"
    vlan_id: 1337
    max_lpars: 20
    available_memory_gb: 512
    available_processors: 32
  
  - name: "LTC09U32-ZZ"
    vswitch_name: "ETHERNET0"
    vlan_id: 1337
    max_lpars: 20
    available_memory_gb: 512
    available_processors: 32

# =============================================================================
# STORAGE BACKEND CONFIGURATION
# =============================================================================
# Supported types: "svc", "vios", "physical"
storage:
  type: "svc"
  
  # SVC Configuration (when type: "svc")
  svc:
    ip: "192.0.2.5"
    username: "admin"
    password: "admin123"
    pool_name: "Pool0"
    volume_prefix: "ocp_"  # Prefix for volume names (e.g., ocp_master0_boot)
  
  # VIOS Configuration (when type: "vios")
  vios:
    - system_name: "LTC09U31-ZZ"
      vios_name: "vios1"
      volume_group: "rootvg"
    - system_name: "LTC09U32-ZZ"
      vios_name: "vios1"
      volume_group: "rootvg"
  
  # Physical Disk Configuration (when type: "physical")
  physical:
    boot_disk: "/dev/sda"
    data_disk: "/dev/sdb"

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================
network:
  domain: "example.com"
  cluster_name: "ocp4"
  base_domain: "example.com"
  
  # Network settings
  network_cidr: "192.168.7.0/24"
  gateway: "REDACTED_LAB_GW<=="
  netmask: "255.255.255.0"
  broadcast: "192.168.7.255"
  nameserver: "REDACTED_LAB_IP<=="  # Helper node will be DNS server
  
  # Upstream DNS forwarders
  dns_forwarders:
    - "8.8.8.8"
    - "8.8.4.4"
  
  # MAC address prefix for generated MACs
  mac_prefix: "52:54:00"

# =============================================================================
# OPENSHIFT CLUSTER CONFIGURATION
# =============================================================================
openshift:
  version: "4.14"
  pull_secret_file: "./pull-secret.json"
  ssh_public_key_file: "~/.ssh/id_rsa.pub"
  
  # OpenShift networking
  cluster_network_cidr: "10.128.0.0/14"
  cluster_network_host_prefix: 23
  service_network: "172.30.0.0/16"
  machine_network: "192.168.7.0/24"

# =============================================================================
# ANSIBLE PLAYBOOK CONFIGURATION
# =============================================================================
# Configuration for the Ansible playbook used to setup the helper node
# and perform OpenShift installation tasks
ansible:
  # Git repository containing the Ansible playbook
  # Default: https://github.com/cs-zhang/ocp4-ai-powervm.git
  # You can specify your own fork or customized version here
  playbook_repo: "https://github.com/cs-zhang/ocp4-ai-powervm.git"
  
  # Git branch to checkout
  # Default: main
  playbook_branch: "main"
  
  # Path to the Ansible variables file (relative to playbook directory)
  # This file will be generated by the deployer
  # Default: vars.yaml
  vars_file: "vars.yaml"

# =============================================================================
# HELPER NODE (BASTION) CONFIGURATION
# =============================================================================
# IMPORTANT: The helper node must be pre-provisioned by the user with:
# - RHEL 8/9 or CentOS Stream installed
# - Network connectivity to HMC and cluster network
# - SSH access configured
# - Sufficient disk space for RHCOS images and configs
#
# The deployer will configure services on this existing node
helper_node:
  # Existing helper node details
  hostname: "helper.ocp4.example.com"
  ip: "REDACTED_LAB_IP<=="
  ssh_user: "root"
  ssh_key_file: "~/.ssh/id_rsa"
  
  # Services configuration
  services:
    dnsmasq:
      enabled: true
      dhcp_range_start: "192.168.7.50"
      dhcp_range_end: "192.168.7.200"
      dhcp_lease_time: "12h"
      tftp_root: "/var/lib/tftpboot"
    
    http:
      enabled: true
      port: 8080
      document_root: "/var/www/html"
    
    haproxy:
      enabled: true
      stats_port: 9000
    
    nfs:
      enabled: true
      export_path: "/exports"
  
  # Network interface for services
  network_interface: "env2"  # Actual interface name

# =============================================================================
# BOOTSTRAP NODE CONFIGURATION
# =============================================================================
bootstrap:
  name: "bootstrap"
  hostname: "bootstrap.ocp4.example.com"
  ip: "192.168.7.20"
  system_name: "LTC09U31-ZZ"
  
  lpar:
    os_type: "AIX/Linux"
    processor:
      type: "shared"
      units: 2.0
      virtual_procs: 8
      min_units: 1.0
      max_units: 4.0
      min_procs: 4
      max_procs: 16
    memory:
      desired_mb: 16384  # 16GB
      min_mb: 8192
      max_mb: 32768
    storage:
      boot_disk_gb: 120

# =============================================================================
# MASTER NODES CONFIGURATION
# =============================================================================
masters:
  nodes:
    - name: "master0"
      hostname: "master0.ocp4.example.com"
      ip: "REDACTED_LAB_IP<=="
      system_name: "LTC09U31-ZZ"
    
    - name: "master1"
      hostname: "master1.ocp4.example.com"
      ip: "192.168.7.22"
      system_name: "LTC09U31-ZZ"
    
    - name: "master2"
      hostname: "master2.ocp4.example.com"
      ip: "192.168.7.23"
      system_name: "LTC09U32-ZZ"
  
  lpar:
    os_type: "AIX/Linux"
    processor:
      type: "shared"
      units: 2.0
      virtual_procs: 8
      min_units: 1.0
      max_units: 4.0
      min_procs: 4
      max_procs: 16
    memory:
      desired_mb: 32768  # 32GB
      min_mb: 16384
      max_mb: 65536
    storage:
      boot_disk_gb: 120
      etcd_disk_gb: 100

# =============================================================================
# WORKER NODES CONFIGURATION
# =============================================================================
workers:
  nodes:
    - name: "worker0"
      hostname: "worker0.ocp4.example.com"
      ip: "REDACTED_LAB_GW<==1"
      system_name: "LTC09U31-ZZ"
    
    - name: "worker1"
      hostname: "worker1.ocp4.example.com"
      ip: "REDACTED_LAB_GW<==2"
      system_name: "LTC09U32-ZZ"
    
    - name: "worker2"
      hostname: "worker2.ocp4.example.com"
      ip: "REDACTED_LAB_GW<==3"
      system_name: "LTC09U32-ZZ"
  
  lpar:
    os_type: "AIX/Linux"
    processor:
      type: "shared"
      units: 2.0
      virtual_procs: 8
      min_units: 1.0
      max_units: 4.0
      min_procs: 4
      max_procs: 16
    memory:
      desired_mb: 32768  # 32GB
      min_mb: 16384
      max_mb: 65536
    storage:
      boot_disk_gb: 120
      container_storage_gb: 200

# =============================================================================
# DEPLOYMENT OPTIONS
# =============================================================================
deployment:
  phases:
    - validate_config
    - check_resources
    - setup_helper_node      # Configure dnsmasq, HTTP, HAProxy on existing helper
    - create_lpars           # Create bootstrap, masters, workers
    - attach_storage
    - configure_network
    - generate_ignition
    - power_on_bootstrap
    - wait_bootstrap
    - power_on_masters
    - power_on_workers
    - monitor_installation
    - cleanup_bootstrap
  
  timeouts:
    lpar_creation: 10
    storage_attachment: 5
    power_on: 5
    helper_setup: 30
    bootstrap_complete: 30
    installation_complete: 60
  
  retry:
    max_attempts: 3
    delay_seconds: 30
  
  cleanup_on_failure: false
  verbose: true

# =============================================================================
# ADVANCED OPTIONS
# =============================================================================
advanced:
  parallel_lpar_creation: true
  max_parallel_operations: 5
  
  validate_resources: true
  check_network_connectivity: true
  verify_storage_capacity: true
  
  auto_distribute_lpars: true
  distribution_strategy: "balanced"  # balanced, fill-first, manual
  
  save_kubeconfig: true
  kubeconfig_path: "./kubeconfig"
  
  enable_monitoring: true
  monitoring_interval_seconds: 30
  
  state_file: "./deployment-state.json"
  save_state_on_each_phase: true

