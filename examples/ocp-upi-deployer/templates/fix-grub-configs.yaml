---
# =============================================================================
# Ansible Playbook: Fix GRUB PXE Boot Configuration
# =============================================================================
# This playbook fixes the grub.cfg generation issue in ocp4-ai-powervm
# by creating proper MAC-specific grub configuration files for each node.
#
# The upstream playbook generates grub.cfg with MAC address conditionals
# that don't work correctly. This playbook generates individual grub configs
# for each node's MAC address.
#
# Usage:
#   ansible-playbook -i inventory -e @vars.yaml fix-grub-configs.yaml
# =============================================================================

- name: Fix GRUB PXE Boot Configuration
  hosts: helper
  become: yes
  vars:
    grub_dir: "/var/lib/tftpboot/boot/grub2/powerpc-ieee1275"
    helper_ip: "{{ helper.ipaddr }}"
  
  tasks:
    - name: Create MAC-specific grub config for bootstrap node
      when: bootstrap is defined and bootstrap.macaddr is defined
      block:
        - name: Format bootstrap MAC address for grub filename
          set_fact:
            bootstrap_mac_formatted: "01-{{ bootstrap.macaddr | lower | replace(':', '-') }}"
        
        - name: Create grub config for bootstrap node
          copy:
            dest: "{{ grub_dir }}/grub.cfg-{{ bootstrap_mac_formatted }}"
            content: |
              set default=0
              set timeout=1
              
              menuentry "CoreOS ({{ bootstrap.name }})" {
                 echo "Loading kernel for {{ bootstrap.name }}"
                 linux (tftp)/rhcos/kernel ip=dhcp console=tty0 console=ttyS0 console=hvc0,115200n8 rd.neednet=1 ignition.platform.id=metal ignition.firstboot coreos.live.rootfs_url=http://{{ helper_ip }}:8000/install/rootfs.img ignition.config.url=http://{{ helper_ip }}:8000/ignition/bootstrap.ign
              
                 echo "Loading initrd"
                 initrd (tftp)/rhcos/initramfs.img
              }
            mode: '0644'
        
        - name: Log bootstrap grub config creation
          debug:
            msg: "Created {{ grub_dir }}/grub.cfg-{{ bootstrap_mac_formatted }} for {{ bootstrap.name }}"
    
    - name: Create MAC-specific grub configs for master nodes
      when: masters is defined and masters | length > 0
      block:
        - name: Generate grub configs for each master
          loop: "{{ masters }}"
          loop_control:
            loop_var: master
          vars:
            master_mac_formatted: "01-{{ master.macaddr | lower | replace(':', '-') }}"
            # Determine ignition file based on deployment type
            ignition_file: "{% if masters | length == 1 %}master-sno.ign{% else %}master.ign{% endif %}"
          copy:
            dest: "{{ grub_dir }}/grub.cfg-{{ master_mac_formatted }}"
            content: |
              set default=0
              set timeout=1
              
              menuentry "CoreOS ({{ master.name }})" {
                 echo "Loading kernel for {{ master.name }}"
                 linux (tftp)/rhcos/kernel ip=dhcp console=tty0 console=ttyS0 console=hvc0,115200n8 rd.neednet=1 ignition.platform.id=metal ignition.firstboot coreos.live.rootfs_url=http://{{ helper_ip }}:8000/install/rootfs.img ignition.config.url=http://{{ helper_ip }}:8000/ignition/{{ ignition_file }}
              
                 echo "Loading initrd"
                 initrd (tftp)/rhcos/initramfs.img
              }
            mode: '0644'
        
        - name: Log master grub configs creation
          debug:
            msg: "Created grub configs for {{ masters | length }} master node(s)"
    
    - name: Create MAC-specific grub configs for worker nodes
      when: workers is defined and workers | length > 0
      block:
        - name: Generate grub configs for each worker
          loop: "{{ workers }}"
          loop_control:
            loop_var: worker
          vars:
            worker_mac_formatted: "01-{{ worker.macaddr | lower | replace(':', '-') }}"
            # Workers use worker-sno.ign for SNO day-2, worker.ign for HA
            ignition_file: "{% if masters | length == 1 %}worker-sno-day2.ign{% else %}worker.ign{% endif %}"
          copy:
            dest: "{{ grub_dir }}/grub.cfg-{{ worker_mac_formatted }}"
            content: |
              set default=0
              set timeout=1
              
              menuentry "CoreOS ({{ worker.name }})" {
                 echo "Loading kernel for {{ worker.name }}"
                 linux (tftp)/rhcos/kernel ip=dhcp console=tty0 console=ttyS0 console=hvc0,115200n8 rd.neednet=1 ignition.platform.id=metal ignition.firstboot coreos.live.rootfs_url=http://{{ helper_ip }}:8000/install/rootfs.img ignition.config.url=http://{{ helper_ip }}:8000/ignition/{{ ignition_file }}
              
                 echo "Loading initrd"
                 initrd (tftp)/rhcos/initramfs.img
              }
            mode: '0644'
        
        - name: Log worker grub configs creation
          debug:
            msg: "Created grub configs for {{ workers | length }} worker node(s)"
    
    - name: Update main grub.cfg to remove MAC conditionals
      copy:
        dest: "{{ grub_dir }}/../grub.cfg"
        content: |
          # Default grub config - fallback if MAC-specific config not found
          # MAC-specific configs are in: {{ grub_dir }}/grub.cfg-01-{mac-address}
          set default=0
          set timeout=5
          
          menuentry "CoreOS (Default)" {
             echo "Loading kernel"
             echo "Note: This is the fallback config. MAC-specific configs should be used."
             linux (tftp)/rhcos/kernel ip=dhcp console=tty0 console=ttyS0 console=hvc0,115200n8 rd.neednet=1 ignition.platform.id=metal ignition.firstboot coreos.live.rootfs_url=http://{{ helper_ip }}:8000/install/rootfs.img ignition.config.url=http://{{ helper_ip }}:8000/ignition/master-sno.ign
          
             echo "Loading initrd"
             initrd (tftp)/rhcos/initramfs.img
          }
        mode: '0644'
    
    - name: List all generated grub configs
      find:
        paths: "{{ grub_dir }}"
        patterns: "grub.cfg-*"
      register: grub_configs
    
    - name: Display generated grub configs
      debug:
        msg: "Generated {{ grub_configs.files | length }} MAC-specific grub config(s)"
    
    - name: Show grub config files
      debug:
        msg: "{{ item.path | basename }}"
      loop: "{{ grub_configs.files }}"
      when: grub_configs.files | length > 0

